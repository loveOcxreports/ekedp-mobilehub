        phone: `+234${800000000 + Math.floor(Math.random() * 99999999)}`,
        meter: Math.random() > 0.3 ? String(4000000000 + Math.floor(Math.random() * 999999999)) : "—",
        addr: `${Math.floor(Math.random() * 40) + 1} ${["Adeniran St", "Balogun Rd", "Marina Cl", "Ojo Rd", "Agbara Ave"][Math.floor(Math.random() * 5)]}, Lagos`,
        bu: BUS[Math.floor(Math.random() * BUS.length)],
        cat: rp.cat,
        sub: issuesForCat[Math.floor(Math.random() * issuesForCat.length)],
        resp: rp.name,
        status,
        note: status === "resolved" ? "Resolved on site, customer confirmed restoration." : status === "progress" ? "Escalated to field team, pending update." : "—",
        date: `2026-07-${pad(d)}`,
      });
    }
  }
  return tickets;
}

function Chip({ active, onClick, children, t }) {
  return (
    <button
      onClick={onClick}
      className="ek-chip"
      style={{
        font: "600 11px/1 Sora,sans-serif", padding: "7px 13px", borderRadius: 999,
        background: active ? t.accent : t.chipBg,
        color: active ? "#fff" : t.text,
        border: `1px solid ${active ? t.accent : t.chipBorder}`,
        whiteSpace: "nowrap", flexShrink: 0, cursor: "pointer",
      }}
    >{children}</button>
  );
}

function StatusPill({ status, t }) {
  const color = t[status];
  return (
    <span style={{
      font: "700 9px/1 Sora,sans-serif", textTransform: "uppercase", letterSpacing: ".05em",
      padding: "4px 9px", borderRadius: 999, color,
      background: `${color}26`,
    }}>{STATUS_META[status].label}</span>
  );
}

function KPI({ label, value, sub, stripe, t }) {
  return (
    <div style={{
      flex: "0 0 108px", background: t.chipBg, border: `1px solid ${t.chipBorder}`,
      borderRadius: 10, padding: "12px 13px", position: "relative", overflow: "hidden",
    }}>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: stripe }} />
      <div style={{ font: "700 8.5px/1 Sora,sans-serif", textTransform: "uppercase", letterSpacing: ".07em", color: t.sub, marginBottom: 6 }}>{label}</div>
      <div style={{ font: "800 24px/1 JetBrains Mono,monospace", color: t.heading }}>{value}</div>
      <div style={{ font: "500 9px/1.3 Sora,sans-serif", color: t.sub, marginTop: 3 }}>{sub}</div>
    </div>
  );
}

function TicketCard({ tk, t, onOpen, showDay }) {
  return (
    <div onClick={() => onOpen(tk)} style={{
      background: t.card, border: `1px solid ${t.border}`, borderRadius: 12, padding: 13,
      marginBottom: 9, cursor: "pointer",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <span style={{ font: "700 12px/1 JetBrains Mono,monospace", color: t.accent }}>#{tk.num}</span>
        <StatusPill status={tk.status} t={t} />
      </div>
      <div style={{ font: "700 13px/1.3 Sora,sans-serif", color: t.heading, marginTop: 8 }}>{tk.name}</div>
      <div style={{ font: "500 11px/1.4 Sora,sans-serif", color: t.sub, marginTop: 2 }}>{tk.cat} · {tk.sub}</div>
      {tk.note !== "—" && (
        <div style={{ font: "500 10.5px/1.4 Sora,sans-serif", color: t.text, marginTop: 6, fontStyle: "italic" }}>"{tk.note}"</div>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 9 }}>
        <span style={{
          font: "700 9px/1 Sora,sans-serif", padding: "3px 8px", borderRadius: 6,
          background: t.chipBg, color: t.sub, border: `1px solid ${t.chipBorder}`,
        }}>{tk.bu}</span>
        <span style={{ font: "500 9.5px/1 JetBrains Mono,monospace", color: t.sub }}>
          {showDay ? `${tk.date.slice(5)} · ` : ""}{tk.time}
        </span>
      </div>
    </div>
  );
}

function SectionCard({ title, subtitle, t, children }) {
  return (
    <div style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 12, padding: 14, marginBottom: 12 }}>
      <div style={{ font: "800 13px/1.2 Sora,sans-serif", color: t.heading }}>{title}</div>
      {subtitle && <div style={{ font: "500 10px/1.3 Sora,sans-serif", color: t.sub, marginTop: 2, marginBottom: 10 }}>{subtitle}</div>}
      {!subtitle && <div style={{ marginTop: 10 }} />}
      {children}
    </div>
  );
}

function Bar({ label, value, max, color, t, valueLabel }) {
  const pct = max > 0 ? (value / max) * 100 : 0;
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ font: "600 10.5px/1 Sora,sans-serif", color: t.text }}>{label}</span>
        <span style={{ font: "700 10.5px/1 JetBrains Mono,monospace", color: t.heading }}>{valueLabel ?? value}</span>
      </div>
      <div style={{ height: 7, borderRadius: 999, background: t.chipBg, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", borderRadius: 999, background: color }} />
      </div>
    </div>
  );
}

/* ============================== MAIN APP ============================== */
const TABS = [
  { id: "dashboard", icon: "🏠", label: "Dashboard" },
  { id: "daily", icon: "📋", label: "Daily" },
  { id: "complaints", icon: "📨", label: "Complaints" },
  { id: "cumulative", icon: "📊", label: "Cumulative" },
  { id: "analytics", icon: "📈", label: "Analytics" },
  { id: "agents", icon: "👥", label: "Agents" },
  { id: "settings", icon: "⚙️", label: "Settings" },
];

function App() {
  const [themeName, setThemeName] = useState("midnight");
  const t = THEMES[themeName];
  const [tab, setTab] = useState("dashboard");
  const [tickets, setTickets] = useState(() => genTickets());
  const [wat, setWat] = useState(new Date());
  const [selected, setSelected] = useState(null);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(null);
  const fileRef = useRef(null);
  const [loaded, setLoaded] = useState(false);
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved

  // Agents (declared early — referenced by the storage effects below)
  const [roster, setRoster] = useState(() => Object.fromEntries(AGENTS.map((a, i) => [a.id, ["day", "day", "night", "night", "off", "mobile"][i]])));
  const [photos, setPhotos] = useState({});
  const photoInputRef = useRef(null);
  const [uploadTarget, setUploadTarget] = useState(null);

  // Pull saved state on open — this is what makes edits stick between visits.
  useEffect(() => {
    try {
      const raw = localStorage.getItem("ekedp-mobile-hub-state");
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.tickets?.length) setTickets(saved.tickets);
        if (saved.roster) setRoster(saved.roster);
        if (saved.photos) setPhotos(saved.photos);
        if (saved.themeName) setThemeName(saved.themeName);
      }
    } catch {
      // no saved state yet, or storage unavailable — keep the generated sample data
    } finally {
      setLoaded(true);
    }
  }, []);

  // Push state to storage whenever it changes, after the initial pull completes.
  useEffect(() => {
    if (!loaded) return;
    setSaveState("saving");
    const handle = setTimeout(() => {
      try {
        localStorage.setItem("ekedp-mobile-hub-state", JSON.stringify({ tickets, roster, photos, themeName }));
        setSaveState("saved");
      } catch {
        setSaveState("idle");
      }
    }, 400);
    return () => clearTimeout(handle);
  }, [loaded, tickets, roster, photos, themeName]); // eslint-disable-line

  useEffect(() => {
    const iv = setInterval(() => setWat((d) => new Date(d.getTime() + 30000)), 30000);
    return () => clearInterval(iv);
  }, []);

  // Daily / Monthly report state
  const [reportMode, setReportMode] = useState("daily"); // daily | monthly
  const days = useMemo(() => [...new Set(tickets.map((tk) => tk.date))].sort(), [tickets]);
  const [activeDay, setActiveDay] = useState(() => days[days.length - 1]);
  useEffect(() => { if (!activeDay && days.length) setActiveDay(days[days.length - 1]); }, [days]); // eslint-disable-line

  // All complaints filters
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [buFilter, setBuFilter] = useState("all");

  function handlePhotoPick(e) {
    const file = e.target.files?.[0];
    if (!file || !uploadTarget) return;
    const reader = new FileReader();
    reader.onload = () => setPhotos((p) => ({ ...p, [uploadTarget]: reader.result }));
    reader.readAsDataURL(file);
    e.target.value = "";
  }
  function openPhotoPicker(agentId) {
    setUploadTarget(agentId);
    setTimeout(() => photoInputRef.current?.click(), 0);
  }
  function handlePhotoDrop(e, agentId) {
    e.preventDefault();
    const file = e.dataTransfer.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setPhotos((p) => ({ ...p, [agentId]: reader.result }));
    reader.readAsDataURL(file);
  }

  const totals = useMemo(() => {
    const r = tickets.filter((x) => x.status === "resolved").length;
    const p = tickets.filter((x) => x.status === "progress").length;
    const u = tickets.filter((x) => x.status === "unresolved").length;
    return { total: tickets.length, resolved: r, progress: p, unresolved: u };
  }, [tickets]);

  const byParty = useMemo(() => {
    return RESPONSIBLE.map((rp) => {
      const list = tickets.filter((x) => x.resp === rp.name);
      const r = list.filter((x) => x.status === "resolved").length;
      const p = list.filter((x) => x.status === "progress").length;
      const u = list.filter((x) => x.status === "unresolved").length;
      const total = list.length;
      const pct = total ? Math.round((r / total) * 100) : 0;
      return { ...rp, r, p, u, total, pct };
    }).filter((x) => x.total > 0).sort((a, b) => b.total - a.total);
  }, [tickets]);

  const recentUpdates = useMemo(() => {
    return [...tickets].slice(-6).reverse();
  }, [tickets]);

  const unresolvedList = useMemo(() => tickets.filter((x) => x.status === "unresolved").slice(0, 8), [tickets]);

  const dayTickets = useMemo(() => {
    if (reportMode === "daily") return tickets.filter((x) => x.date === activeDay);
    const month = (activeDay || "").slice(0, 7);
    return tickets.filter((x) => x.date.startsWith(month));
  }, [tickets, activeDay, reportMode]);

  const dayGroups = useMemo(() => {
    if (reportMode === "daily") return days.map((d) => ({ key: d, label: d.slice(8), count: tickets.filter((x) => x.date === d).length }));
    const months = [...new Set(days.map((d) => d.slice(0, 7)))];
    return months.map((m) => ({ key: m, label: new Date(m + "-01").toLocaleString("default", { month: "short" }), count: tickets.filter((x) => x.date.startsWith(m)).length }));
  }, [days, tickets, reportMode]);

  const filteredComplaints = useMemo(() => {
    return tickets.filter((tk) => {
      if (statusFilter !== "all" && tk.status !== statusFilter) return false;
      if (buFilter !== "all" && tk.bu !== buFilter) return false;
      if (search.trim()) {
        const s = search.toLowerCase();
        if (![tk.name, tk.num, tk.bu, tk.cat, tk.sub].join(" ").toLowerCase().includes(s)) return false;
      }
      return true;
    }).slice().reverse();
  }, [tickets, statusFilter, buFilter, search]);

  const catBreakdown = useMemo(() => {
    const m = {};
    tickets.forEach((tk) => { m[tk.cat] = (m[tk.cat] || 0) + 1; });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [tickets]);

  const buBreakdown = useMemo(() => {
    const m = {};
    tickets.forEach((tk) => { m[tk.bu] = (m[tk.bu] || 0) + 1; });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [tickets]);

  const dailyVolume = useMemo(() => days.map((d) => ({ d, count: tickets.filter((x) => x.date === d).length })), [days, tickets]);
  const maxDaily = Math.max(1, ...dailyVolume.map((x) => x.count));

  function openTicket(tk) { setSelected(tk); setEditing(false); setDraft({ status: tk.status, resp: tk.resp, note: tk.note }); }
  function saveEdit() {
    setTickets((prev) => prev.map((x) => x.num === selected.num ? { ...x, ...draft } : x));
    setSelected((s) => ({ ...s, ...draft }));
    setEditing(false);
  }
  function exportJSON() {
    const blob = new Blob([JSON.stringify({ exportedAt: new Date().toISOString(), total: tickets.length, tickets }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `EKEDP-All-Complaints-${new Date().toISOString().slice(0, 10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  }
  function importJSON(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!Array.isArray(parsed.tickets)) throw new Error("bad schema");
        setTickets(parsed.tickets);
      } catch { alert("Invalid JSON file — expected the EKEDP complaints export format."); }
    };
    reader.readAsText(file);
  }

  const screenTitles = {
    dashboard: "Mobile Hub", daily: "Daily Report", complaints: "All Complaints",
    cumulative: "Cumulative Tracker", analytics: "Analytics", agents: "Agents", settings: "Settings",
  };
  const screenSubs = {
    daily: "Drill into a day or month", complaints: `${filteredComplaints.length} of ${tickets.length} complaints`,
    cumulative: "Running totals per responsible party", analytics: "Visual breakdowns",
    agents: "Manage the CX shift roster", settings: "Theme and data",
  };

  return (
    <div className="ek-outer">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;700;800&display=swap');
        html, body { margin: 0; }
        .ek-scroll::-webkit-scrollbar{display:none}
        .ek-scroll{scrollbar-width:none}
        .ek-outer{ min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; background:#e8eaef; padding:40px; font-family:${SORA}; box-sizing:border-box; }
        .ek-outer-inner{ display:flex; flex-direction:column; align-items:center; gap:14px; width:100%; }
        .ek-label{ font:700 12px/1 Sora,sans-serif; color:#6B7280; letter-spacing:.08em; text-transform:uppercase; }
        .ek-phone{ width:402px; height:874px; border-radius:48px; overflow:hidden; position:relative; background:#000; box-shadow:0 40px 80px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.14); }
        .ek-notch, .ek-clock{ display:flex; }
        @media (max-width: 480px), (pointer: coarse) and (max-width: 760px) {
          .ek-outer{ padding:0; background:${t.bg}; }
          .ek-outer-inner{ gap:0; }
          .ek-label{ display:none; }
          .ek-phone{ width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none; }
          .ek-notch, .ek-clock{ display:none; }
        }
      `}</style>
      <div className="ek-outer-inner">
        <div className="ek-label">EKEDP Power App · Mobile Hub</div>
        <div className="ek-phone">
          <div className="ek-notch" style={{ position: "absolute", top: 11, left: "50%", transform: "translateX(-50%)", width: 126, height: 37, borderRadius: 24, background: "#000", zIndex: 50 }} />
          <div className="ek-clock" style={{ position: "absolute", top: 0, left: 0, right: 0, zIndex: 20, alignItems: "center", justifyContent: "center", padding: "21px 24px 10px" }}>
            <span style={{ font: "590 17px/22px -apple-system,system-ui", color: "#fff" }}>9:41</span>
          </div>

          <div style={{ height: "100%", display: "flex", flexDirection: "column", background: t.bg, fontFamily: SORA }}>
            {/* HERO */}
            <div style={{ flexShrink: 0, paddingTop: "calc(54px + env(safe-area-inset-top))", background: t.hero, borderBottom: `1px solid ${t.border}`, position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", top: "-40%", right: "-10%", width: 320, height: 320, background: `radial-gradient(circle, ${t.heroGlow} 0%, transparent 70%)`, pointerEvents: "none" }} />
              <div style={{ padding: "10px 20px 16px", position: "relative", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 9, minWidth: 0 }}>
                  <img src={EKEDP_LOGO} alt="EKEDP" style={{ width: 30, height: 30, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} />
                  <div style={{ minWidth: 0 }}>
                    <div style={{ font: "800 13px/1.1 Sora,sans-serif", color: "#fff", letterSpacing: ".2px" }}>{screenTitles[tab]}</div>
                    <div style={{ font: "500 9px/1.3 Sora,sans-serif", color: "rgba(255,255,255,.65)", marginTop: 1 }}>EKEDP CX · Marina HQ</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,.07)", border: "1px solid rgba(255,255,255,.14)", borderRadius: 9, padding: "5px 9px", flexShrink: 0 }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#22C55E" }} />
                  <span style={{ font: "700 10px/1 JetBrains Mono,monospace", color: "#fff" }}>
                    {wat.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })} WAT
                  </span>
                </div>
              </div>

              {tab === "dashboard" ? (
                <div>
                  <div style={{ padding: "2px 20px 16px" }}>
                    <h1 style={{ font: "italic 800 19px/1.2 Sora,sans-serif", color: "#fff", margin: 0 }}>Good day, CX Team ☀️</h1>
                    <p style={{ font: "500 11px/1.4 Sora,sans-serif", color: "rgba(255,255,255,.7)", margin: "3px 0 0" }}>
                      Latest activity: {days[days.length - 1]?.slice(5)} · {days.length} days tracked
                    </p>
                  </div>
                  <div className="ek-scroll" style={{ display: "flex", gap: 9, overflowX: "auto", padding: "0 20px 18px" }}>
                    <KPI label="Total" value={totals.total} sub="all tickets" stripe={t.accent} t={{ ...t, sub: "rgba(255,255,255,.6)", heading: "#fff", chipBg: "rgba(255,255,255,.06)", chipBorder: "rgba(255,255,255,.1)" }} />
                    <KPI label="Resolved" value={totals.resolved} sub={`${Math.round((totals.resolved / totals.total) * 100) || 0}%`} stripe={t.resolved} t={{ ...t, sub: "rgba(255,255,255,.6)", heading: "#fff", chipBg: "rgba(255,255,255,.06)", chipBorder: "rgba(255,255,255,.1)" }} />
                    <KPI label="In Progress" value={totals.progress} sub="active" stripe={t.progress} t={{ ...t, sub: "rgba(255,255,255,.6)", heading: "#fff", chipBg: "rgba(255,255,255,.06)", chipBorder: "rgba(255,255,255,.1)" }} />
                    <KPI label="Unresolved" value={totals.unresolved} sub="needs action" stripe={t.unresolved} t={{ ...t, sub: "rgba(255,255,255,.6)", heading: "#fff", chipBg: "rgba(255,255,255,.06)", chipBorder: "rgba(255,255,255,.1)" }} />
                    <KPI label="Latest Day" value={days.length} sub="days logged" stripe="#60A5FA" t={{ ...t, sub: "rgba(255,255,255,.6)", heading: "#fff", chipBg: "rgba(255,255,255,.06)", chipBorder: "rgba(255,255,255,.1)" }} />
                  </div>
                </div>
              ) : (
                <div style={{ padding: "2px 20px 16px" }}>
                  <h1 style={{ font: "800 19px/1.2 Sora,sans-serif", color: "#fff", margin: 0 }}>{screenTitles[tab]}</h1>
                  <p style={{ font: "500 11px/1.4 Sora,sans-serif", color: "rgba(255,255,255,.7)", margin: "3px 0 0" }}>{screenSubs[tab]}</p>
                </div>
              )}
            </div>

            {/* BODY */}
            <div className="ek-scroll" style={{ flex: 1, overflowY: "auto", padding: "16px 16px 12px" }}>
              {tab === "dashboard" && (
                <>
                  <SectionCard title="🎯 Responsible Parties" t={t}>
                    {byParty.slice(0, 6).map((p) => (
                      <div key={p.name} style={{ marginBottom: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                          <div>
                            <div style={{ font: "700 11.5px/1.2 Sora,sans-serif", color: t.heading }}>{p.name}</div>
                            <div style={{ font: "500 9.5px/1.3 Sora,sans-serif", color: t.sub }}>{p.cat}</div>
                          </div>
                          <div style={{ font: "800 12px/1 JetBrains Mono,monospace", color: p.pct >= 70 ? t.resolved : p.pct >= 40 ? t.progress : t.unresolved }}>{p.pct}%</div>
                        </div>
                        <div style={{ height: 6, borderRadius: 999, background: t.chipBg, overflow: "hidden" }}>
                          <div style={{ width: `${p.pct}%`, height: "100%", background: p.pct >= 70 ? t.resolved : p.pct >= 40 ? t.progress : t.unresolved, borderRadius: 999 }} />
                        </div>
                      </div>
                    ))}
                  </SectionCard>

                  <SectionCard title="🔔 Recent Status Updates" t={t}>
                    {recentUpdates.map((u) => (
                      <div key={u.num} style={{ display: "flex", gap: 9, alignItems: "flex-start", marginBottom: 11 }}>
                        <span style={{ width: 8, height: 8, borderRadius: "50%", background: t[u.status], marginTop: 4, flexShrink: 0 }} />
                        <div style={{ minWidth: 0 }}>
                          <div style={{ font: "600 11px/1.3 Sora,sans-serif", color: t.text }}>
                            <b style={{ color: t.heading }}>{u.resp.split(" ")[0]}</b> updated #{u.num} → {STATUS_META[u.status].label}
                          </div>
                          <div style={{ font: "500 9.5px/1.3 Sora,sans-serif", color: t.sub, marginTop: 1 }}>{u.bu} · {u.cat} · {u.time}</div>
                        </div>
                      </div>
                    ))}
                  </SectionCard>

                  <SectionCard title="🔴 Unresolved — Action Needed" t={t}>
                    {unresolvedList.map((u) => (
                      <div key={u.num} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${t.border}` }}>
                        <div>
                          <div style={{ font: "700 11.5px/1.3 Sora,sans-serif", color: t.heading }}>#{u.num} · {u.name}</div>
                          <div style={{ font: "500 9.5px/1.3 Sora,sans-serif", color: t.sub }}>{u.time} · {u.cat}</div>
                        </div>
                        <span style={{ font: "700 9px/1 Sora,sans-serif", padding: "3px 8px", borderRadius: 6, background: t.chipBg, color: t.sub, border: `1px solid ${t.chipBorder}` }}>{u.bu}</span>
                      </div>
                    ))}
                  </SectionCard>
                </>
              )}

              {tab === "daily" && (
                <>
                  <div style={{ display: "flex", background: t.chipBg, border: `1px solid ${t.chipBorder}`, borderRadius: 10, padding: 3, marginBottom: 12 }}>
                    {["daily", "monthly"].map((m) => (
                      <button key={m} onClick={() => setReportMode(m)} style={{
                        flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer",
                        background: reportMode === m ? t.accent : "transparent",
                        color: reportMode === m ? "#fff" : t.text, font: "700 11px/1 Sora,sans-serif", textTransform: "capitalize",
                      }}>{m}</button>
                    ))}
                  </div>
                  <div className="ek-scroll" style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 14 }}>
                    {dayGroups.map((g) => (
                      <div key={g.key} onClick={() => setActiveDay(reportMode === "daily" ? g.key : g.key + "-01")} style={{
                        flex: "0 0 auto", padding: "8px 12px", borderRadius: 10, cursor: "pointer",
                        border: `1px solid ${(activeDay || "").startsWith(g.key) ? t.accent : t.chipBorder}`,
                        background: (activeDay || "").startsWith(g.key) ? `${t.accent}1f` : t.chipBg,
                        borderLeft: (activeDay || "").startsWith(g.key) ? `3px solid ${t.accent}` : `1px solid ${t.chipBorder}`,
                      }}>
                        <div style={{ font: "700 11px/1 Sora,sans-serif", color: t.heading }}>{g.label}</div>
                        <div style={{ font: "600 9px/1 JetBrains Mono,monospace", color: t.sub, marginTop: 3 }}>{g.count} tickets</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
                    <KPI label="Total" value={dayTickets.length} sub="tickets" stripe="#60A5FA" t={t} />
                    <KPI label="Resolved" value={dayTickets.filter((x) => x.status === "resolved").length} sub="closed" stripe={t.resolved} t={t} />
                    <KPI label="In Progress" value={dayTickets.filter((x) => x.status === "progress").length} sub="active" stripe={t.progress} t={t} />
                    <KPI label="Unresolved" value={dayTickets.filter((x) => x.status === "unresolved").length} sub="pending" stripe={t.unresolved} t={t} />
                  </div>
                  {dayTickets.map((tk) => <TicketCard key={tk.num} tk={tk} t={t} onOpen={openTicket} />)}
                </>
              )}

              {tab === "complaints" && (
                <>
                  <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="🔎 Search name, ticket #, category…" className="ek-input" style={{
                    width: "100%", boxSizing: "border-box", padding: "11px 13px", borderRadius: 10, marginBottom: 10,
                    background: t.chipBg, border: `1px solid ${t.chipBorder}`, color: t.text, font: "500 12px/1 Sora,sans-serif",
                  }} />
                  <div className="ek-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", marginBottom: 8 }}>
                    {["all", "resolved", "progress", "unresolved"].map((s) => (
                      <Chip key={s} t={t} active={statusFilter === s} onClick={() => setStatusFilter(s)}>{s === "all" ? "All" : STATUS_META[s].label}</Chip>
                    ))}
                  </div>
                  <div className="ek-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", marginBottom: 12 }}>
                    <Chip t={t} active={buFilter === "all"} onClick={() => setBuFilter("all")}>All BU</Chip>
                    {BUS.map((b) => <Chip key={b} t={t} active={buFilter === b} onClick={() => setBuFilter(b)}>{b}</Chip>)}
                  </div>
                  <div style={{ font: "600 10.5px/1 Sora,sans-serif", color: t.sub, marginBottom: 10 }}>{filteredComplaints.length} of {tickets.length} complaints</div>
                  {filteredComplaints.map((tk) => <TicketCard key={tk.num} tk={tk} t={t} onOpen={openTicket} showDay />)}
                </>
              )}

              {tab === "cumulative" && (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
                    <KPI label="Grand Total" value={totals.total} sub="all time" stripe="#60A5FA" t={t} />
                    <KPI label="Resolved" value={totals.resolved} sub={`${Math.round((totals.resolved / totals.total) * 100) || 0}%`} stripe={t.resolved} t={t} />
                    <KPI label="In Progress" value={totals.progress} sub="active" stripe={t.progress} t={t} />
                    <KPI label="Unresolved" value={totals.unresolved} sub="pending" stripe={t.unresolved} t={t} />
                  </div>
                  <SectionCard title="Resolution by Responsible Party" t={t}>
                    {byParty.map((p) => (
                      <div key={p.name} style={{ padding: "10px 0", borderBottom: `1px solid ${t.border}` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <div style={{ font: "700 12px/1.3 Sora,sans-serif", color: t.heading }}>{p.name}</div>
                            <div style={{ font: "500 9.5px/1.3 Sora,sans-serif", color: t.sub }}>{p.cat}</div>
                          </div>
                          <span style={{
                            font: "800 11px/1 Sora,sans-serif", padding: "4px 10px", borderRadius: 999,
                            color: p.pct >= 70 ? t.resolved : p.pct >= 40 ? t.progress : t.unresolved,
                            background: `${p.pct >= 70 ? t.resolved : p.pct >= 40 ? t.progress : t.unresolved}26`,
                          }}>{p.pct}%</span>
                        </div>
                        <div style={{ display: "flex", gap: 14, marginTop: 8 }}>
                          <span style={{ font: "700 11px/1 JetBrains Mono,monospace", color: t.resolved }}>{p.r} <span style={{ color: t.sub, fontWeight: 500, fontSize: 9 }}>Res</span></span>
                          <span style={{ font: "700 11px/1 JetBrains Mono,monospace", color: t.progress }}>{p.p} <span style={{ color: t.sub, fontWeight: 500, fontSize: 9 }}>Prog</span></span>
                          <span style={{ font: "700 11px/1 JetBrains Mono,monospace", color: t.unresolved }}>{p.u} <span style={{ color: t.sub, fontWeight: 500, fontSize: 9 }}>Unres</span></span>
                          <span style={{ font: "700 11px/1 JetBrains Mono,monospace", color: "#60A5FA" }}>{p.total} <span style={{ color: t.sub, fontWeight: 500, fontSize: 9 }}>Total</span></span>
                        </div>
                      </div>
                    ))}
                  </SectionCard>
                </>
              )}

              {tab === "analytics" && (
                <>
                  <SectionCard title="Category Breakdown" subtitle="Volume by complaint category" t={t}>
                    {catBreakdown.map(([cat, count]) => (
                      <Bar key={cat} label={cat} value={count} max={catBreakdown[0][1]} color={t.accent} t={t} />
                    ))}
                  </SectionCard>
                  <SectionCard title="Business Unit" subtitle="Volume by district" t={t}>
                    {buBreakdown.map(([bu, count]) => (
                      <Bar key={bu} label={bu} value={count} max={buBreakdown[0][1]} color="#60A5FA" t={t} />
                    ))}
                  </SectionCard>
                  <SectionCard title="Daily Volume Trend" t={t}>
                    <div className="ek-scroll" style={{ display: "flex", gap: 8, overflowX: "auto", alignItems: "flex-end", height: 100, padding: "0 2px" }}>
                      {dailyVolume.map((d) => (
                        <div key={d.d} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, flexShrink: 0 }}>
                          <div style={{ width: 14, height: Math.max(4, (d.count / maxDaily) * 70), background: t.accent, borderRadius: 3 }} />
                          <span style={{ font: "600 8px/1 JetBrains Mono,monospace", color: t.sub }}>{d.d.slice(8)}</span>
                        </div>
                      ))}
                    </div>
                  </SectionCard>
                  <SectionCard title="Resolution Rate by Party" t={t}>
                    {byParty.map((p) => (
                      <Bar key={p.name} label={p.name.split(" ")[0]} value={p.pct} max={100} valueLabel={`${p.pct}%`} color={p.pct >= 70 ? t.resolved : p.pct >= 40 ? t.progress : t.unresolved} t={t} />
                    ))}
                  </SectionCard>
                  <SectionCard title="Status Distribution" t={t}>
                    {["resolved", "progress", "unresolved"].map((s) => {
                      const count = totals[s === "progress" ? "progress" : s];
                      const pct = Math.round((count / totals.total) * 100) || 0;
                      return (
                        <div key={s} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 10px", borderRadius: 8, background: `${t[s]}18`, marginBottom: 7 }}>
                          <span style={{ font: "700 11px/1 Sora,sans-serif", color: t.heading }}>{STATUS_META[s].label}</span>
                          <span style={{ font: "700 11px/1 JetBrains Mono,monospace", color: t[s] }}>{count} · {pct}%</span>
                        </div>
                      );
                    })}
                  </SectionCard>
                </>
              )}

              {tab === "agents" && (
                <>
                  {AGENTS.map((a) => (
                    <div key={a.id} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 12, padding: 13, marginBottom: 10, position: "relative", overflow: "hidden" }}>
                      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: a.color }} />
                      <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
                        <div
                          onClick={() => openPhotoPicker(a.id)}
                          onDragOver={(e) => e.preventDefault()}
                          onDrop={(e) => handlePhotoDrop(e, a.id)}
                          title="Tap to add photo"
                          style={{
                            width: 44, height: 44, borderRadius: "50%", border: `2px solid ${a.color}`,
                            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20,
                            flexShrink: 0, cursor: "pointer", overflow: "hidden", background: t.chipBg,
                          }}
                        >
                          {photos[a.id] ? (
                            <img src={photos[a.id]} alt={a.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                          ) : a.emoji}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ font: "800 13px/1.2 Sora,sans-serif", color: t.heading }}>{a.name}</div>
                          <div style={{ font: "600 10px/1.3 Sora,sans-serif", color: t.sub, marginTop: 1 }}>
                            {SHIFTS[roster[a.id]].icon} {SHIFTS[roster[a.id]].label}{SHIFTS[roster[a.id]].hours && ` · ${SHIFTS[roster[a.id]].hours}`}
                          </div>
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 6, marginTop: 11 }}>
                        {Object.entries(SHIFTS).map(([key, s]) => (
                          <button key={key} onClick={() => setRoster((r) => ({ ...r, [a.id]: key }))} title={s.label} style={{
                            flex: 1, padding: "8px 0", borderRadius: 8, cursor: "pointer", fontSize: 14,
                            border: `1px solid ${roster[a.id] === key ? a.color : t.chipBorder}`,
                            background: roster[a.id] === key ? `${a.color}26` : t.chipBg,
                          }}>{s.icon}</button>
                        ))}
                      </div>
                    </div>
                  ))}
                  <input ref={photoInputRef} type="file" accept="image/*" onChange={handlePhotoPick} style={{ display: "none" }} />
                  <div style={{ font: "500 9.5px/1.4 Sora,sans-serif", color: t.sub, textAlign: "center", padding: "10px 6px" }}>
                    Roster is manager-editable only. Changes here are local to this session.
                  </div>
                </>
              )}

              {tab === "settings" && (
                <>
                  <SectionCard title="🎨 Theme" t={t}>
                    {["midnight", "daylight"].map((name) => (
                      <div key={name} onClick={() => setThemeName(name)} style={{
                        display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 13px",
                        borderRadius: 10, border: `2px solid ${themeName === name ? t.accent : t.chipBorder}`,
                        background: t.chipBg, marginBottom: 8, cursor: "pointer", textTransform: "capitalize",
                      }}>
                        <span style={{ font: "700 12px/1 Sora,sans-serif", color: t.heading }}>{name}</span>
                        {themeName === name && <span style={{ color: t.accent, fontWeight: 800 }}>✓</span>}
                      </div>
                    ))}
                  </SectionCard>
                  <SectionCard title="📋 Import / Export Data" t={t}>
                    <button onClick={exportJSON} style={{ width: "100%", padding: "11px 0", borderRadius: 9, border: "none", background: t.accent, color: "#fff", font: "700 12px/1 Sora,sans-serif", marginBottom: 9, cursor: "pointer" }}>
                      Export as JSON
                    </button>
                    <button onClick={() => fileRef.current?.click()} style={{ width: "100%", padding: "11px 0", borderRadius: 9, border: `1px solid ${t.chipBorder}`, background: t.chipBg, color: t.text, font: "700 12px/1 Sora,sans-serif", cursor: "pointer" }}>
                      Import JSON
                    </button>
                    <input ref={fileRef} type="file" accept="application/json" onChange={importJSON} style={{ display: "none" }} />
                  </SectionCard>
                  <SectionCard title="💾 Storage" t={t}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{
                        width: 7, height: 7, borderRadius: "50%",
                        background: saveState === "saved" ? t.resolved : saveState === "saving" ? t.progress : t.sub,
                      }} />
                      <span style={{ font: "600 11px/1 Sora,sans-serif", color: t.text }}>
                        {saveState === "saved" ? "All changes saved" : saveState === "saving" ? "Saving…" : "Loading your data…"}
                      </span>
                    </div>
                    <div style={{ font: "500 9.5px/1.4 Sora,sans-serif", color: t.sub, marginTop: 6 }}>
                      Your edits, theme, and agent photos are saved automatically in this browser and reload every time you open this page — no need to redo anything between visits. (Saved per-device/per-browser, not synced across phones yet.)
                    </div>
                  </SectionCard>
                  <div style={{ font: "500 9.5px/1.4 Sora,sans-serif", color: t.sub, textAlign: "center", padding: "6px 10px" }}>
                    This is a reference build — not live-synced to SharePoint. Import/Export moves data manually as JSON.
                  </div>
                </>
              )}
            </div>

            {/* TAB BAR */}
            <div style={{ flexShrink: 0, display: "flex", background: t.navbg, borderTop: `1px solid ${t.border}`, padding: "8px 4px calc(14px + env(safe-area-inset-bottom))", backdropFilter: "blur(10px)" }}>
              {TABS.map((tb) => (
                <button key={tb.id} onClick={() => setTab(tb.id)} className="ek-tab" style={{
                  flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "4px 0",
                }}>
                  <span style={{ fontSize: 17, opacity: tab === tb.id ? 1 : 0.45 }}>{tb.icon}</span>
                  <span style={{ font: "700 8px/1 Sora,sans-serif", color: tab === tb.id ? t.accent : t.sub }}>{tb.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* TICKET DETAIL OVERLAY */}
          {selected && (
            <div style={{ position: "absolute", inset: 0, background: t.bg, zIndex: 100, display: "flex", flexDirection: "column" }}>
              <div style={{ flexShrink: 0, paddingTop: "calc(54px + env(safe-area-inset-top))", background: t.hero, borderBottom: `1px solid ${t.border}` }}>
                <div style={{ padding: "10px 18px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "#fff", fontSize: 18, cursor: "pointer", padding: 0 }}>←</button>
                    <div>
                      <div style={{ font: "800 13px/1.1 Sora,sans-serif", color: "#fff" }}>#{selected.num}</div>
                      <div style={{ font: "500 9px/1.3 Sora,sans-serif", color: "rgba(255,255,255,.65)" }}>{selected.date} · {selected.time}</div>
                    </div>
                  </div>
                  {editing ? (
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={() => { setEditing(false); setDraft({ status: selected.status, resp: selected.resp, note: selected.note }); }} style={{ font: "700 10.5px/1 Sora,sans-serif", color: "rgba(255,255,255,.7)", background: "none", border: "none", cursor: "pointer" }}>Cancel</button>
                      <button onClick={saveEdit} style={{ font: "700 10.5px/1 Sora,sans-serif", color: "#fff", background: t.accent, border: "none", borderRadius: 7, padding: "6px 12px", cursor: "pointer" }}>Save</button>
                    </div>
                  ) : (
                    <button onClick={() => setEditing(true)} style={{ font: "700 10.5px/1 Sora,sans-serif", color: "#fff", background: "rgba(255,255,255,.14)", border: "1px solid rgba(255,255,255,.2)", borderRadius: 7, padding: "6px 12px", cursor: "pointer" }}>Edit</button>
                  )}
                </div>
              </div>
              <div className="ek-scroll" style={{ flex: 1, overflowY: "auto", padding: "16px 16px 30px" }}>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  {editing ? (
                    <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
                      {["resolved", "progress", "unresolved"].map((s) => (
                        <button key={s} onClick={() => setDraft((d) => ({ ...d, status: s }))} style={{
                          font: "700 10px/1 Sora,sans-serif", padding: "7px 12px", borderRadius: 999, cursor: "pointer",
                          border: `1px solid ${draft.status === s ? t[s] : t.chipBorder}`,
                          background: draft.status === s ? `${t[s]}26` : t.chipBg, color: draft.status === s ? t[s] : t.text,
                        }}>{STATUS_META[s].label}</button>
                      ))}
                    </div>
                  ) : <StatusPill status={selected.status} t={t} />}
                </div>

                <SectionCard title="Customer" t={t}>
                  <div style={{ font: "700 13px/1.3 Sora,sans-serif", color: t.heading }}>{selected.name}</div>
                  <div style={{ font: "600 11px/1.4 JetBrains Mono,monospace", color: t.sub, marginTop: 3 }}>{selected.phone}</div>
                </SectionCard>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
                  {[
                    ["Business Unit", selected.bu], ["Category", selected.cat],
                    ["Responsible", editing ? null : selected.resp], ["Meter", selected.meter],
                  ].map(([label, val], i) => (
                    <div key={i} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 10, padding: 11 }}>
                      <div style={{ font: "700 8.5px/1 Sora,sans-serif", textTransform: "uppercase", letterSpacing: ".06em", color: t.sub, marginBottom: 5 }}>{label}</div>
                      {label === "Responsible" && editing ? (
                        <input value={draft.resp} onChange={(e) => setDraft((d) => ({ ...d, resp: e.target.value }))} className="ek-input" style={{
                          width: "100%", boxSizing: "border-box", background: t.chipBg, border: `1px solid ${t.chipBorder}`,
                          borderRadius: 6, padding: "5px 7px", color: t.heading, font: "600 11px/1.3 Sora,sans-serif",
                        }} />
                      ) : (
                        <div style={{ font: "700 11.5px/1.3 Sora,sans-serif", color: t.heading }}>{label === "Responsible" ? selected.resp : val}</div>
                      )}
                    </div>
                  ))}
                </div>

                <SectionCard title="Issue" t={t}>
                  <div style={{ font: "500 12px/1.5 Sora,sans-serif", color: t.text }}>{selected.sub}</div>
                </SectionCard>
                <SectionCard title="Address" t={t}>
                  <div style={{ font: "500 12px/1.5 Sora,sans-serif", color: t.text }}>{selected.addr}</div>
                </SectionCard>
                <SectionCard title="Resolution Note" t={t}>
                  {editing ? (
                    <textarea value={draft.note === "—" ? "" : draft.note} onChange={(e) => setDraft((d) => ({ ...d, note: e.target.value || "—" }))} rows={3} className="ek-input" style={{
                      width: "100%", boxSizing: "border-box", background: t.chipBg, border: `1px solid ${t.chipBorder}`,
                      borderRadius: 8, padding: 9, color: t.text, font: "500 11.5px/1.4 Sora,sans-serif", resize: "none",
                    }} placeholder="Add a resolution note…" />
                  ) : (
                    <div style={{ font: "500 12px/1.5 Sora,sans-serif", color: t.text }}>{selected.note}</div>
                  )}
                </SectionCard>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
